services:
  # Base de datos MySQL
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DISHCOVER_DB_NAME:-dishcover}
      MYSQL_USER: ${DISHCOVER_DB_USER:-dishcover}
      MYSQL_PASSWORD: ${DISHCOVER_DB_PASSWORD:-dishcover}
      MYSQL_ROOT_PASSWORD: ${DISHCOVER_DB_ROOT_PASSWORD:-root}
    volumes:
      - dishcover_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  # API REST Spring Boot
  backend:
    build:
      context: ./backend
    image: dishcover-backend:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DISHCOVER_DB_NAME:-dishcover}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DISHCOVER_DB_USER:-dishcover}
      SPRING_DATASOURCE_PASSWORD: ${DISHCOVER_DB_PASSWORD:-dishcover}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dishcover-tfg-development-secret-key-2026-manuel-garcia-nieto}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-36000000}
    ports:
      - "${DISHCOVER_BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Interfaz ligera para gestionar la base de datos
  adminer:
    image: adminer:5
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    ports:
      - "${DISHCOVER_ADMINER_PORT:-8083}:8080"

volumes:
  dishcover_mysql_data:
