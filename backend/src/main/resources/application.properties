spring.application.name=dishcover-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dishcover?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dishcover}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dishcover}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

app.author=Manuel Garcia Nieto
app.jwt.secret=${APP_JWT_SECRET:dishcover-tfg-development-secret-key-2026-manuel-garcia-nieto}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:36000000}
